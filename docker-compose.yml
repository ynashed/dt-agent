# dt-agent — Isaac Sim 5.1 + Cosmos Reason 2 8B NIM (self-hosted VLM)
#
# Usage:
#   docker login nvcr.io -u '$oauthtoken' -p $NGC_API_KEY    # one-time
#   docker compose pull vlm                                  # pulls NIM image
#   docker compose build                                     # builds isaac-sim
#   docker compose up                                        # starts both
#
# Endpoints (host):
#   http://localhost:8765   — Isaac Sim HTTP RPC (sim_server.py)
#   http://localhost:8000   — Cosmos Reason 2 8B chat completions
#
# GPU layout (2x RTX 6000 Pro Blackwell):
#   GPU 0 -> isaac-sim   (rendering + physics)
#   GPU 1 -> vlm         (Cosmos Reason 2 8B inference)

services:
  isaac-sim:
    build:
      context: .
      dockerfile: Dockerfile.isaacsim
    container_name: dt-agent-sim
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    environment:
      - ACCEPT_EULA=Y
      - PRIVACY_CONSENT=Y
      - OMNI_KIT_ALLOW_ROOT=1
    ports:
      - "8765:8765"
    volumes:
      # Code mounted read-only — edit on host, restart container to pick up changes.
      - ./src:/workspace/dt-agent/src:ro
      - ./scripts:/workspace/dt-agent/scripts:ro
      - ./catalog:/workspace/dt-agent/catalog:ro
      # Output mounted read-write so saved USDs appear on the host for
      # GUI inspection in Isaac Sim / USD Composer.
      - ./output:/workspace/dt-agent/output:rw
      # Kit / Omniverse caches — named volumes so they survive container recreation.
      # First boot will be slow (~minutes); subsequent boots fast.
      - dt-agent-kit-cache:/isaac-sim/kit/cache
      - dt-agent-ov-cache:/root/.cache/ov
      - dt-agent-pip-cache:/root/.cache/pip
      - dt-agent-gl-cache:/root/.cache/nvidia/GLCache
      - dt-agent-compute-cache:/root/.nv/ComputeCache
      - dt-agent-logs:/root/.nvidia-omniverse/logs
      - dt-agent-data:/root/.local/share/ov/data
    # The base image's ENTRYPOINT is runheadless.sh (the streaming server).
    # We need to fully override it to launch our MCP server instead, so we
    # set both entrypoint and command — otherwise compose's `command` is
    # just appended as args to runheadless.sh and silently ignored.
    entrypoint: ["/isaac-sim/python.sh"]
    command:
      - /workspace/dt-agent/src/dt_agent/sim_server.py
    stdin_open: true
    tty: true

  vlm:
    image: nvcr.io/nim/nvidia/cosmos-reason2-8b:latest
    container_name: dt-agent-vlm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    # NIM pattern from the build.nvidia.com deploy page: needs --ipc host
    # and a generous shared-memory budget for model loading.
    ipc: host
    shm_size: 32gb
    environment:
      # Required for the NIM to validate / re-fetch model weights from NGC
      # at runtime. Pulled from .env by docker compose.
      - NGC_API_KEY=${NGC_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      # Persist model weights across restarts — first-run download is large
      # (several GB) and slow; this makes subsequent starts fast.
      - dt-agent-vlm-cache:/opt/nim/.cache

volumes:
  dt-agent-kit-cache:
  dt-agent-ov-cache:
  dt-agent-pip-cache:
  dt-agent-gl-cache:
  dt-agent-compute-cache:
  dt-agent-logs:
  dt-agent-data:
  dt-agent-vlm-cache:
