# dt-agent — Isaac Sim 5.1 + Cosmos Reason 2 8B NIM + Material Agent
#
# Usage:
#   docker login nvcr.io -u '$oauthtoken' -p $NGC_API_KEY    # one-time
#   git submodule update --init --recursive                  # one-time
#   docker compose pull vlm                                  # pulls NIM image
#   docker compose build                                     # builds the rest
#
#   docker compose up                                        # default — isaac-sim + vlm only
#   docker compose --profile materialize up                  # + material-agent + ovrtx
#
# Why two modes: OVRTX claims ~48 GB on GPU 0 the moment it starts, which
# competes with isaac-sim's rendering. Keep it off unless you're actively
# running materialize() — bring the materialize profile up on demand.
#
# Endpoints (host):
#   http://localhost:8765   — Isaac Sim HTTP RPC (sim_server.py)
#   http://localhost:8000   — Cosmos Reason 2 8B chat completions
#   http://localhost:8001   — OVRTX rendering API     (materialize profile)
#   http://localhost:8002   — material-agent REST API (materialize profile)
#   localhost:49100 (TCP)   — WebRTC signaling (Isaac Sim livestream)
#   localhost:47998 (UDP)   — WebRTC media (Isaac Sim livestream)
#
# Connect a viewer with the Isaac Sim WebRTC Streaming Client at 127.0.0.1.
# Toggle the livestream off by removing DT_AGENT_LIVESTREAM=1 below.
#
# GPU layout (2x RTX 6000 Pro Blackwell, 96 GB each):
#   GPU 0 -> isaac-sim          (rendering + physics, ~30–40 GB)
#         -> ovrtx-rendering-api (materialize profile only; ~48 GB)
#   GPU 1 -> vlm                (Cosmos Reason 2 8B inference, ~16 GB)
# material-agent-service is CPU-only and routes VLM calls to the `vlm`
# service above (Cosmos Reason 2 8B) via docker DNS — no extra VLM process.

services:
  isaac-sim:
    build:
      context: .
      dockerfile: Dockerfile.isaacsim
    container_name: dt-agent-sim
    # WebRTC livestream requires host networking — bridge mode breaks ICE
    # negotiation. With host mode all container ports bind directly on the
    # host, so the explicit `ports:` block below is dropped.
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    environment:
      - ACCEPT_EULA=Y
      - PRIVACY_CONSENT=Y
      - OMNI_KIT_ALLOW_ROOT=1
      - DT_AGENT_LIVESTREAM=1
    volumes:
      # Code mounted read-only — edit on host, restart container to pick up changes.
      - ./src:/workspace/dt-agent/src:ro
      - ./scripts:/workspace/dt-agent/scripts:ro
      - ./catalog:/workspace/dt-agent/catalog:ro
      # Output mounted read-write so saved USDs appear on the host for
      # GUI inspection in Isaac Sim / USD Composer.
      - ./output:/workspace/dt-agent/output:rw
      # Kit / Omniverse caches — named volumes so they survive container recreation.
      # First boot will be slow (~minutes); subsequent boots fast.
      - dt-agent-kit-cache:/isaac-sim/kit/cache
      - dt-agent-ov-cache:/root/.cache/ov
      - dt-agent-pip-cache:/root/.cache/pip
      - dt-agent-gl-cache:/root/.cache/nvidia/GLCache
      - dt-agent-compute-cache:/root/.nv/ComputeCache
      - dt-agent-logs:/root/.nvidia-omniverse/logs
      - dt-agent-data:/root/.local/share/ov/data
    # The base image's ENTRYPOINT is runheadless.sh (the streaming server).
    # We need to fully override it to launch our MCP server instead, so we
    # set both entrypoint and command — otherwise compose's `command` is
    # just appended as args to runheadless.sh and silently ignored.
    entrypoint: ["/isaac-sim/python.sh"]
    command:
      - /workspace/dt-agent/src/dt_agent/sim_server.py
    stdin_open: true
    tty: true

  vlm:
    image: nvcr.io/nim/nvidia/cosmos-reason2-8b:latest
    container_name: dt-agent-vlm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    # NIM pattern from the build.nvidia.com deploy page: needs --ipc host
    # and a generous shared-memory budget for model loading.
    ipc: host
    shm_size: 32gb
    environment:
      # Required for the NIM to validate / re-fetch model weights from NGC
      # at runtime. Pulled from .env by docker compose.
      - NGC_API_KEY=${NGC_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      # Persist model weights across restarts — first-run download is large
      # (several GB) and slow; this makes subsequent starts fast.
      - dt-agent-vlm-cache:/opt/nim/.cache

  # ──────────────────────────────────────────────────────────────────────────
  # Material Agent integration (NVIDIA-Omniverse/content-agents)
  # ──────────────────────────────────────────────────────────────────────────
  # Builds from ../content-agents — clone that repo as a sibling dir.
  # Provides VLM-driven material assignment via REST. dt-agent's host-side
  # `materialize(prim_path)` tool (added in a later commit) will POST to
  # material-agent-service, poll for completion, fetch predictions JSONL,
  # then apply via our existing bind_material RPC.

  ovrtx-rendering-api:
    profiles: [materialize]
    build:
      context: ./content-agents
      dockerfile: apps/ovrtx_rendering_api/Dockerfile
    container_name: dt-agent-ovrtx
    ports:
      - "8001:8000"
    environment:
      - OVRTX_LOG_LEVEL=warn
      # PT = path tracing (Kit-parity ground truth, ~9 ms / step at 512x512).
      # 500 steps hit the convergence plateau on the kit golden scene.
      - OVRTX_RENDER_MODE=pt
      - OVRTX_NUM_SENSOR_UPDATES=500
      # Cold start commonly takes ~5 min before gpu_initialized=true.
      - OVRTX_DAEMON_START_TIMEOUT=600
      - OVRTX_DAEMON_RENDER_TIMEOUT=1800
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]   # shared with isaac-sim; both intermittent
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health | grep -q '\"gpu_initialized\":true'"]
      interval: 30s
      timeout: 10s
      retries: 12
      start_period: 120s

  material-agent-service:
    profiles: [materialize]
    build:
      context: ./content-agents
      dockerfile: apps/material_agent_service/Dockerfile
    container_name: dt-agent-material-agent
    ports:
      - "8002:8000"   # remapped from 8000 — clashes with `vlm` above
    depends_on:
      ovrtx-rendering-api:
        condition: service_healthy
    environment:
      # Rendering: local OVRTX sidecar over the compose bridge network.
      - RENDER_ENDPOINT=http://ovrtx-rendering-api:8000
      - MA_RENDERING_USE_DATA_URI=true
      # VLM: route to our existing Cosmos Reason 2 8B NIM via docker DNS.
      # Saves a third VLM process. Override MA_VLM_* in .env to point at
      # build.nvidia.com / OpenAI / Anthropic / Gemini if Cosmos Reason
      # turns out to be too small for the material-identification task.
      - MA_VLM_BACKEND=nim
      - MA_VLM_MODEL=nvidia/cosmos-reason2-8b
      - MA_VLM_NIM_BASE_URL=http://vlm:8000/v1
      - MA_LLM_BACKEND=nim
      - MA_LLM_MODEL=nvidia/cosmos-reason2-8b
      # Our local NIM doesn't authenticate, but the SDK requires non-empty.
      - NVIDIA_API_KEY=${NV_API_KEY:-not-needed}
      # Service config
      - MA_STORAGE_KIND=local
      - MA_SESSION_STORAGE_PATH=/var/material-agent/sessions
      - MA_SESSION_TTL_HOURS=24
      - MA_MAX_ACTIVE_SESSIONS=8
      - MA_MAX_UPLOAD_SIZE_MB=500
    volumes:
      - dt-agent-material-sessions:/var/material-agent/sessions
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  dt-agent-kit-cache:
  dt-agent-ov-cache:
  dt-agent-pip-cache:
  dt-agent-gl-cache:
  dt-agent-compute-cache:
  dt-agent-logs:
  dt-agent-data:
  dt-agent-vlm-cache:
  dt-agent-material-sessions:
